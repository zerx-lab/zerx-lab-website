<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
    <rect x="0" y="0" width="10" height="10" class="main" />
    <rect x="6" y="6" width="10" height="10" class="accent" />
    <style>
        .main { fill: #000; }
        .accent { fill: #000; fill-opacity: 0.35; }
        @media (prefers-color-scheme: dark) {
            .main { fill: #FFF; }
            .accent { fill: #FFF; fill-opacity: 0.35; }
        }
    </style>
</svg>
